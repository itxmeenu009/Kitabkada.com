<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login-style.css">
    <link rel="icon" href="./Logo.png" type="icon/png">
    <title>Login | Kitab Kada</title>
</head>
<body>
    <div class="container">
        <div class="info-section">
            <div class="overlay"></div>
            <div class="info-content">
                <h1>Admin Access Only</h1>
                <p>If you are a reader, feel free to head back and continue exploring our collection.</p>
                <a href="index.html" class="btn-secondary">Go Back to Website</a>
            </div>
        </div>

        <div class="login-section">
            <div class="login-box">
                <h2 id="login-h2">Kitab Kada</h2>
                <p class="subtitle">Please enter your credentials</p>
                
                <form id="login-form">
                    <!-- Email Field -->
                    <div class="input-group">
                        <i class='bx bx-envelope'></i>
                        <input type="email" id="email" placeholder="Email Address" required autocomplete="email">
                    </div>
                    
                    <!-- Password Field with Eye Icon -->
                    <div class="input-group password-group">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                        <i class='bx bx-hide' id="toggle-password" style="left: auto; right: 15px; cursor: pointer; color: #94a3b8; font-size: 1.3rem; transition: 0.3s;"></i>
                    </div>

                    <!-- Messages -->
                    <div id="error-message" style="color: #e53e3e; margin-bottom: 15px; display: none; font-size: 0.9rem; text-align: center; background: #fed7d7; padding: 10px; border-radius: 8px;"></div>
                    <div id="success-message" style="color: #38a169; margin-bottom: 15px; display: none; font-size: 0.9rem; text-align: center; background: #c6f6d5; padding: 10px; border-radius: 8px;"></div>
                    
                    <button type="submit" id="login-btn">Sign In</button>
                </form>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="index.html" style="color: #114b62; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: 0.3s;">← Back to Home</a>
                </div>
                
            </div>
        </div>
    </div>

    <script type="module" src="./login.js"></script>
</body>
</html>
